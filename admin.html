<!doctype html><html lang="ru"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ANTKSL · Статистика сайта</title>
<style>
:root{--bg:#0f1115;--card:#171a21;--line:#262b36;--ink:#e8eaed;--mut:#8b93a3;--acc:#6ea8fe}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.5 system-ui,Segoe UI,Roboto,sans-serif;padding:24px}
h1{font-size:20px;margin:0}.sub{color:var(--mut);font-size:13px}
.bar{display:flex;gap:10px;align-items:center;margin-bottom:14px}.bar h1{flex:1}
.bar select,.bar button{background:#0d0f14;border:1px solid var(--line);color:var(--ink);padding:8px 12px;border-radius:8px;cursor:pointer}
.bar button{background:var(--acc);color:#06101f;border:0;font-weight:600}
#status{margin-bottom:16px;font-size:13px;color:var(--mut)}
.kpi{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:18px}
.kpi .b{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 18px;min-width:130px}
.kpi .n{font-size:26px;font-weight:700}.kpi .l{color:var(--mut);font-size:12px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px}
.card h2{font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:var(--mut);margin:0 0 12px}
.row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--line)}.row:last-child{border:0}.row .v{color:var(--acc);font-weight:600}
.barline{height:6px;background:#0d0f14;border-radius:4px;margin-top:4px;overflow:hidden}.barline i{display:block;height:100%;background:var(--acc)}
.empty{color:var(--mut);text-align:center;padding:20px}
</style></head><body>
<div class="bar">
  <h1>Статистика ANTKSL <span class="sub" style="color:var(--acc)">сборка v4 · с городами</span></h1>
  <select id="period" onchange="load()"><option value="1">сегодня</option><option value="7" selected>7 дней</option><option value="30">30 дней</option><option value="3650">всё время</option></select>
  <button onclick="load()">⟳ Обновить</button>
</div>
<div id="status">Загрузка…</div>
<div class="kpi" id="kpi"></div>
<div class="grid">
  <div class="card"><h2>Топ релизов по кликам</h2><div id="releases"></div></div>
  <div class="card"><h2>Откуда приходят</h2><div id="sources"></div></div>
  <div class="card"><h2>География</h2><div id="geo"></div></div>
  <div class="card"><h2>Города</h2><div id="cities"></div></div>
  <div class="card"><h2>Устройства и язык</h2><div id="device"></div></div>
</div>
<script>
var SB="https://qhxhdzwtcjzdinbicjxl.supabase.co";
var KEY="sb_publishable_6giNbAp4HJTGo_FQCLV6AA_WtwMQlFP";
function rpc(fn,days){
  return fetch(SB.replace(/\/$/,'')+"/rest/v1/rpc/"+fn,
    {method:"POST",headers:{apikey:KEY,Authorization:"Bearer "+KEY,"Content-Type":"application/json"},
     body:JSON.stringify({days:days})}).then(function(r){
       if(!r.ok)return r.text().then(function(t){throw new Error("HTTP "+r.status+": "+t.slice(0,180));});
       return r.json();});
}
function rows(el,data,lk,vk){var box=document.getElementById(el);
  if(!data||!data.length){box.innerHTML='<div class="empty">пока нет данных</div>';return;}
  var max=Math.max.apply(null,data.map(function(r){return +r[vk]||0}));
  box.innerHTML=data.slice(0,12).map(function(r){var w=max?Math.round((+r[vk]||0)/max*100):0;
    return '<div class="row"><span>'+(r[lk]||'—')+'</span><span class="v">'+r[vk]+'</span></div><div class="barline"><i style="width:'+w+'%"></i></div>';}).join('');}
function kpi(n,l){return '<div class="b"><div class="n">'+n+'</div><div class="l">'+l+'</div></div>';}
function load(){
  var d=parseInt(document.getElementById('period').value,10);
  var st=document.getElementById('status'); st.textContent="Загружаю данные…";
  rpc("stats_kpi",d).then(function(r){var k=(r&&r[0])||{pageviews:0,clicks:0,navs:0};
    document.getElementById('kpi').innerHTML=kpi(k.pageviews||0,'просмотров')+kpi(k.clicks||0,'кликов по релизам')+kpi(k.navs||0,'кликов по меню')+kpi(k.pageviews?Math.round((k.clicks||0)/k.pageviews*100)+'%':'0%','конверсия в клик');
    var total=(k.pageviews||0)+(k.clicks||0)+(k.navs||0);
    st.textContent=total?("Готово. Событий за период: "+total):"Подключение работает, но событий пока нет. Зайди на сайт, пощёлкай — и обнови.";
  }).catch(err);
  rpc("stats_releases",d).then(function(r){rows('releases',r,'release','clicks');}).catch(err);
  rpc("stats_sources",d).then(function(r){rows('sources',r,'source','n');}).catch(err);
  rpc("stats_geo",d).then(function(r){rows('geo',r,'country','n');}).catch(err);
  rpc("stats_cities",d).then(function(r){rows('cities',r,'place','n');}).catch(err);
  rpc("stats_device",d).then(function(r){rows('device',r,'label','n');}).catch(err);
}
function err(e){console.warn(e);var st=document.getElementById('status');var m=String(e&&e.message||e);
  var hint="";
  if(/Could not find the function|PGRST202|404/i.test(m))hint=" — не выполнен SQL stats_rpc.sql. Открой Supabase → SQL Editor → вставь файл stats_rpc.sql → Run.";
  else if(/401|Forbidden|secret/i.test(m))hint=" — ключ в панели должен быть ПУБЛИЧНЫЙ (sb_publishable...), не секретный.";
  st.innerHTML='<span style="color:#ff6b6b">Ошибка: '+m+hint+'</span>';}
load();
</script></body></html>
